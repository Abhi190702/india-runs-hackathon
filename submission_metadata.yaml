# RedrobRank V2 submission metadata.
# Fill required placeholders before portal submission.
# Run eval/final_sanity_check.py before setting submission_ready to true.

submission_ready: false  # Set true only after placeholders and sandbox link are final.

team_name: "[YOUR TEAM NAME]"  # REQUIRED

primary_contact:
  name: "[Full Name]"          # REQUIRED
  email: "[primary@example.com]" # REQUIRED
  phone: "+91-XXXXXXXXXX"      # REQUIRED

team_members:
  - name: "[Member 1]"
    email: "[member1@example.com]"
    role: "Team Lead / ML"
  - name: "[Member 2]"
    email: "[member2@example.com]"
    role: "Data Engineering"
  - name: "[Member 3]"
    email: "[member3@example.com]"
    role: "Evaluation / QA"
  - name: "[Member 4]"
    email: "[member4@example.com]"
    role: "Product / Demo"

github_repo: "https://github.com/hazelmayank/india-runs-hackathon" # REQUIRED
sandbox_link: "https://share.streamlit.io/[YOUR_USERNAME]/[YOUR_REPO]/main/app/streamlit_app.py" # REQUIRED after Streamlit deploy

reproduce_command: "python src/rank.py --candidates ./data/candidates.jsonl --out ./submission.csv --profile-runtime"
fast_reproduce_command: "python src/rank.py --candidates ./data/candidates.jsonl --out ./submission_fast.csv --fast --profile-runtime"

compute:
  platform: "local CPU"
  cpu_cores: "[FILL]"          # REQUIRED
  ram_gb: "[FILL]"             # REQUIRED
  python_version: "[FILL]"     # REQUIRED
  os: "[FILL]"                 # REQUIRED
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  hosted_llm_calls_during_ranking: false
  pre_computation_required: false
  expected_runtime_minutes_under_limit: true

ai_tools_used:
  - "Codex / AI coding assistant for implementation and review only"

ai_usage_summary: |
  AI tools helped author, refactor, and review the deterministic ranking code.
  No candidate data is sent to hosted LLMs or external APIs during ranking.

methodology_summary: |
  RedrobRank V2 is a deterministic, source-aware candidate ranker. It scores
  career-backed evidence for retrieval, ranking, search, recommendation,
  embeddings, production ML systems, and Python/NLP foundations. Skills-list
  matches are intentionally weak unless backed by job history. Hireability
  signals measure reachability and logistics. Hard honeypots and soft anomalies
  apply penalties and score caps so impossible or suspicious profiles cannot
  dominate the top 100. A local TF-IDF semantic layer provides a small
  explainable boost without network/API calls.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
  ranking_cpu_only: true
  no_network_calls_during_ranking: true
  no_hosted_llm_calls_during_ranking: true
