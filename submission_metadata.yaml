  pre_computation_time_minutes: 0

ai_tools_used:
  - "Claude"        # architecture, code authoring/review (no candidate data sent to any hosted LLM at ranking time)

ai_usage_summary: |
  Used Claude (Claude Code) to help design the architecture and author the
  ranking pipeline. All ranking runs locally, CPU-only, with no network or
  hosted-LLM calls during scoring. No candidate data is sent to any external
  service at ranking time.

methodology_summary: |
  Transparent, explainable hybrid ranker (no black box). Each candidate gets a
  fit score from (a) weighted JD-concept evidence read from career descriptions
  — not just the skills list, which surfaces "plain-language" fits and resists
  keyword-stuffers; (b) trajectory features (experience band, product-vs-services
  companies, coding recency, job-hop cadence); and (c) an explicit DISQUALIFIER
  engine encoding the JD's "do not want" list (CV/speech-without-NLP, framework-
  only, pure research, all-consulting careers, title-chasing). A behavioral
  AVAILABILITY multiplier down-weights unreachable candidates (inactive, low
  recruiter response, not open-to-work, long notice). A pure-logic CONSISTENCY
  AUDITOR detects internally impossible profiles (honeypots) and floors them.
  Reasoning strings are assembled deterministically from extracted facts, so they
  never hallucinate. Runtime ~27s for 100K candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
